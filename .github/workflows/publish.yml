name: Publish to PyPI

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      test_pypi:
        description: 'Publish to Test PyPI instead of PyPI'
        required: false
        type: boolean
        default: false

jobs:
  publish:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build twine
      
      - name: Build package
        run: python -m build
      
      - name: Check package
        run: twine check dist/*
      
      - name: Publish to Test PyPI
        if: github.event.inputs.test_pypi == 'true'
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.TEST_PYPI_API_TOKEN }}
        run: twine upload --repository testpypi dist/*
      
      - name: Publish to PyPI
        if: github.event.inputs.test_pypi != 'true'
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: twine upload dist/*
      
      - name: Create GitHub Release Assets
        uses: softprops/action-gh-release@v1
        if: github.event_name == 'release'
        with:
          files: dist/*

      - name: Notify Discord
        if: always() && env.DISCORD_WEBHOOK != ''
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          STATUS: ${{ job.status }}
          REPO: ${{ github.repository }}
          RUN_URL: ${{ format('https://github.com/{0}/actions/runs/{1}', github.repository, github.run_id) }}
          WORKFLOW_NAME: ${{ github.workflow }}
        run: |
          # Inlined from smart-memory-infra/.github/actions/discord-notify (private repo
          # not accessible from this public repo's workflow runner).
          case "$STATUS" in
            success)   EMOJI="✅"; COLOR=3066993 ;;
            failure)   EMOJI="❌"; COLOR=15158332 ;;
            cancelled) EMOJI="⚠️"; COLOR=15844367 ;;
            *)         EMOJI="ℹ️"; COLOR=3447003 ;;
          esac
          PAYLOAD=$(jq -nc --arg t "$EMOJI $REPO · $WORKFLOW_NAME · $STATUS" \
                              --arg u "$RUN_URL" \
                              --argjson c "$COLOR" \
              '{embeds:[{title:$t, url:$u, color:$c}]}')
          curl -sS -X POST -H "Content-Type: application/json" \
               -d "$PAYLOAD" "$DISCORD_WEBHOOK" || true
