name: Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest]
        python-version: ['3.11', '3.12']
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      
      - name: Lint with ruff
        run: ruff check smartmemory_client tests
      
      - name: Format check with ruff
        run: ruff format --check smartmemory_client tests
      
      - name: Type check with mypy
        run: mypy smartmemory_client
        continue-on-error: true
      
      - name: Run tests
        run: pytest tests/ -v -m "not integration" --cov=smartmemory_client --cov-report=xml
      
      - name: Upload coverage
        uses: codecov/codecov-action@v3
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

      - name: Notify Discord
        if: always() && env.DISCORD_WEBHOOK != ''
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          STATUS: ${{ job.status }}
          REPO: ${{ github.repository }}
          RUN_URL: ${{ format('https://github.com/{0}/actions/runs/{1}', github.repository, github.run_id) }}
          WORKFLOW_NAME: ${{ github.workflow }}
        run: |
          # Inlined from smart-memory-infra/.github/actions/discord-notify (private repo
          # not accessible from this public repo's workflow runner).
          case "$STATUS" in
            success)   EMOJI="✅"; COLOR=3066993 ;;
            failure)   EMOJI="❌"; COLOR=15158332 ;;
            cancelled) EMOJI="⚠️"; COLOR=15844367 ;;
            *)         EMOJI="ℹ️"; COLOR=3447003 ;;
          esac
          PAYLOAD=$(jq -nc --arg t "$EMOJI $REPO · $WORKFLOW_NAME · $STATUS" \
                              --arg u "$RUN_URL" \
                              --argjson c "$COLOR" \
              '{embeds:[{title:$t, url:$u, color:$c}]}')
          curl -sS -X POST -H "Content-Type: application/json" \
               -d "$PAYLOAD" "$DISCORD_WEBHOOK" || true
